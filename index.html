<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vezlo AI Prompt</title>
<meta name="description" content="Discover, share, and use premium AI prompts for ChatGPT, Midjourney, Photography, and Web Development.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ============================================
   CSS RESET & BASE
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;line-height:1.6;overflow-x:hidden;min-height:100vh;
  background:var(--bg-primary);color:var(--text-primary);transition:background .4s,color .4s}
a{text-decoration:none;color:inherit;transition:color .2s}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
img{max-width:100%;display:block}
ul{list-style:none}
input,textarea,select{font-family:inherit;font-size:inherit;outline:none;border:none}

/* ============================================
   CSS VARIABLES — DARK THEME (Default)
   ============================================ */
:root{
  --bg-primary:#060610;
  --bg-secondary:#0c0c1d;
  --bg-card:#111128;
  --bg-card-hover:#191940;
  --bg-input:#0e0e22;
  --text-primary:#eaeaf2;
  --text-secondary:#8888a8;
  --text-muted:#55556e;
  --accent:#00ffaa;
  --accent-rgb:0,255,170;
  --accent2:#ffd700;
  --accent2-rgb:255,215,0;
  --danger:#ff3366;
  --danger-rgb:255,51,102;
  --info:#00c9db;
  --info-rgb:0,201,219;
  --border:#1c1c3a;
  --border-light:#2a2a50;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow-lg:0 12px 48px rgba(0,0,0,.6);
  --radius:12px;
  --radius-lg:20px;
  --nav-height:70px;
  --glow-accent:0 0 15px rgba(var(--accent-rgb),.4),0 0 40px rgba(var(--accent-rgb),.15);
  --glow-danger:0 0 15px rgba(var(--danger-rgb),.4),0 0 40px rgba(var(--danger-rgb),.15);
  --gradient-hero:linear-gradient(135deg,#060610 0%,#0d1a2d 40%,#0a1628 70%,#060610 100%);
  --gradient-card:linear-gradient(145deg,var(--bg-card) 0%,rgba(17,17,40,.6) 100%);
}

/* ============================================
   CSS VARIABLES — LIGHT THEME
   ============================================ */
[data-theme="light"]{
  --bg-primary:#f2f1eb;
  --bg-secondary:#ffffff;
  --bg-card:#ffffff;
  --bg-card-hover:#f0efe8;
  --bg-input:#f5f5f0;
  --text-primary:#1a1a2e;
  --text-secondary:#55556e;
  --text-muted:#888898;
  --accent:#00b880;
  --accent-rgb:0,184,128;
  --accent2:#b8960a;
  --accent2-rgb:184,150,10;
  --danger:#cc2952;
  --danger-rgb:204,41,82;
  --info:#0090a0;
  --info-rgb:0,144,160;
  --border:#d8d8e0;
  --border-light:#e8e8ee;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --shadow-lg:0 12px 48px rgba(0,0,0,.12);
  --gradient-hero:linear-gradient(135deg,#f2f1eb 0%,#e0e8f0 40%,#dce4ee 70%,#f2f1eb 100%);
  --gradient-card:linear-gradient(145deg,#ffffff 0%,rgba(255,255,255,.8) 100%);
}

/* ============================================
   SCROLL PROGRESS BAR
   ============================================ */
#scroll-progress{position:fixed;top:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--danger));
  z-index:10001;transition:width .05s linear;pointer-events:none}

/* ============================================
   NAVIGATION
   ============================================ */
#main-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);
  background:rgba(6,6,16,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);z-index:1000;transition:background .4s,border .4s}
[data-theme="light"] #main-nav{background:rgba(242,241,235,.88)}
.nav-inner{max-width:1280px;margin:0 auto;height:100%;display:flex;align-items:center;
  justify-content:space-between;padding:0 24px;gap:16px}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.25rem;
  color:var(--accent);letter-spacing:1px;white-space:nowrap}
.nav-logo span{color:var(--text-primary);font-weight:500}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-links a{padding:8px 16px;border-radius:8px;font-weight:500;font-size:.9rem;
  color:var(--text-secondary);transition:all .25s;position:relative}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(var(--accent-rgb),.08)}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-add-prompt{background:var(--accent);color:#060610;font-weight:700;font-size:.85rem;
  padding:8px 18px;border-radius:8px;transition:all .25s;white-space:nowrap}
.btn-add-prompt:hover{box-shadow:var(--glow-accent);transform:translateY(-1px)}
.theme-toggle{width:44px;height:24px;border-radius:12px;background:var(--border-light);
  position:relative;cursor:pointer;transition:background .3s}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;
  border-radius:50%;background:var(--accent);transition:transform .3s}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--text-primary);
  transition:all .3s;border-radius:2px}
.mobile-menu{display:none;position:fixed;top:var(--nav-height);left:0;right:0;bottom:0;
  background:var(--bg-primary);z-index:999;padding:32px 24px;flex-direction:column;gap:8px;
  opacity:0;transform:translateY(-10px);transition:opacity .3s,transform .3s}
.mobile-menu.open{display:flex;opacity:1;transform:translateY(0)}
.mobile-menu a{padding:16px;border-radius:12px;font-size:1.1rem;font-weight:600;
  color:var(--text-secondary);transition:all .25s}
.mobile-menu a:hover,.mobile-menu a.active{color:var(--accent);background:rgba(var(--accent-rgb),.08)}
.mobile-menu .btn-add-prompt{display:inline-block;text-align:center;margin-top:16px;padding:14px}

/* ============================================
   HERO SECTION
   ============================================ */
.hero{min-height:85vh;display:flex;align-items:center;justify-content:center;
  background:var(--gradient-hero);position:relative;overflow:hidden;padding:120px 24px 80px}
.hero-bg-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.3;
  animation:orbFloat 12s ease-in-out infinite;pointer-events:none}
.hero-bg-orb:nth-child(1){width:500px;height:500px;background:var(--accent);top:-10%;left:-10%;animation-delay:0s}
.hero-bg-orb:nth-child(2){width:400px;height:400px;background:var(--danger);bottom:-10%;right:-10%;animation-delay:4s}
.hero-bg-orb:nth-child(3){width:300px;height:300px;background:var(--accent2);top:40%;right:20%;animation-delay:8s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.1)}}
.hero-content{position:relative;z-index:2;text-align:center;max-width:800px}
.hero-badge{display:inline-block;padding:8px 20px;border-radius:50px;font-size:.8rem;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  border:1px solid rgba(var(--accent-rgb),.3);background:rgba(var(--accent-rgb),.06);
  margin-bottom:28px}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,6vw,3.8rem);
  font-weight:900;line-height:1.15;margin-bottom:20px;color:var(--text-primary)}
.hero-title .accent{color:var(--accent)}
.hero-typewrap{display:inline;min-height:1.2em}
.hero-typing{color:var(--accent2);border-right:3px solid var(--accent2);
  animation:cursorBlink .7s step-end infinite;padding-right:2px}
@keyframes cursorBlink{50%{border-color:transparent}}
.hero-desc{font-size:clamp(1rem,2.5vw,1.2rem);color:var(--text-secondary);
  max-width:600px;margin:0 auto 36px;line-height:1.7}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:#060610;font-weight:700;font-size:1rem;
  padding:14px 32px;border-radius:10px;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{box-shadow:var(--glow-accent);transform:translateY(-2px)}
.btn-outline{border:2px solid var(--border-light);color:var(--text-primary);font-weight:600;
  font-size:1rem;padding:14px 32px;border-radius:10px;transition:all .3s;
  display:inline-flex;align-items:center;gap:8px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.06)}

/* ============================================
   SECTIONS COMMON
   ============================================ */
.section{padding:80px 24px;max-width:1280px;margin:0 auto}
.section-header{text-align:center;margin-bottom:48px}
.section-header h2{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,4vw,2.4rem);
  font-weight:800;margin-bottom:12px}
.section-header p{color:var(--text-secondary);max-width:560px;margin:0 auto;font-size:1.05rem}
.section-header .accent-line{width:60px;height:3px;background:var(--accent);margin:16px auto 0;
  border-radius:2px}

/* ============================================
   CATEGORIES
   ============================================ */
.categories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.cat-card{background:var(--gradient-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(var(--accent-rgb),.08),transparent);opacity:0;transition:opacity .3s}
.cat-card:hover::before{opacity:1}
.cat-card:hover{border-color:rgba(var(--accent-rgb),.4);transform:translateY(-4px);box-shadow:var(--glow-accent)}
.cat-card i{font-size:2rem;color:var(--accent);margin-bottom:12px;position:relative;z-index:1}
.cat-card h3{font-size:1rem;font-weight:700;margin-bottom:4px;position:relative;z-index:1}
.cat-card span{font-size:.8rem;color:var(--text-muted);position:relative;z-index:1}

/* ============================================
   PROMPT CARDS GRID
   ============================================ */
.prompts-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:28px}
.search-box{flex:1;min-width:240px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border-radius:10px;
  background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);
  font-size:.95rem;transition:border .25s}
.search-box input:focus{border-color:var(--accent)}
.search-box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.sort-select{padding:12px 16px;border-radius:10px;background:var(--bg-input);
  border:1px solid var(--border);color:var(--text-primary);font-size:.9rem;cursor:pointer}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.chip{padding:8px 18px;border-radius:50px;font-size:.82rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);color:var(--text-secondary);transition:all .25s;background:transparent}
.chip:hover,.chip.active{background:rgba(var(--accent-rgb),.12);border-color:var(--accent);color:var(--accent)}
.prompts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px}
.prompt-card{background:var(--gradient-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s,border-color .3s;
  transform-style:preserve-3d;perspective:800px}
.prompt-card:hover{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 20px rgba(var(--accent-rgb),.2),0 8px 32px rgba(0,0,0,.3)}
.card-images{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:180px;overflow:hidden}
.card-images img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.prompt-card:hover .card-images img{transform:scale(1.05)}
.card-body{padding:18px 20px}
.card-body h3{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;margin-bottom:6px;
  line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-caption{color:var(--text-secondary);font-size:.85rem;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-snippet{font-size:.8rem;color:var(--text-muted);background:var(--bg-input);
  padding:10px 12px;border-radius:8px;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  border-left:3px solid var(--accent)}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.card-tags span{font-size:.7rem;padding:4px 10px;border-radius:50px;font-weight:600;
  background:rgba(var(--accent-rgb),.08);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.15)}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-stats{display:flex;gap:14px}
.card-stats span{font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.card-stats i{font-size:.72rem}
.fav-btn{font-size:1.2rem;color:var(--text-muted);transition:all .3s;padding:4px}
.fav-btn.active{color:var(--danger)}
.fav-btn:hover{transform:scale(1.2)}

/* ============================================
   SKELETON LOADING
   ============================================ */
.skeleton-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.skeleton-img{height:180px;background:linear-gradient(90deg,var(--bg-input) 25%,var(--border) 50%,var(--bg-input) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-body{padding:18px 20px}
.skeleton-line{height:14px;border-radius:6px;margin-bottom:10px;
  background:linear-gradient(90deg,var(--bg-input) 25%,var(--border) 50%,var(--bg-input) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-line.w70{width:70%}.skeleton-line.w50{width:50%}.skeleton-line.w90{width:90%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ============================================
   PROMPT DETAIL PAGE
   ============================================ */
.detail-page{max-width:960px;margin:0 auto;padding:100px 24px 60px}
.detail-back{display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary);
  font-weight:600;font-size:.9rem;margin-bottom:28px;cursor:pointer;transition:color .2s}
.detail-back:hover{color:var(--accent)}
.carousel{position:relative;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:28px;
  background:var(--bg-card);aspect-ratio:16/9}
.carousel-track{display:flex;transition:transform .4s ease;height:100%}
.carousel-track img{min-width:100%;height:100%;object-fit:cover}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;
  border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
.carousel-btn:hover{background:rgba(var(--accent-rgb),.7)}
.carousel-btn.prev{left:12px}.carousel-btn.next{right:12px}
.carousel-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:2}
.carousel-dots span{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.35);
  cursor:pointer;transition:all .25s}
.carousel-dots span.active{background:var(--accent);box-shadow:0 0 8px rgba(var(--accent-rgb),.6)}
.detail-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,4vw,2.2rem);
  font-weight:800;margin-bottom:8px;line-height:1.2}
.detail-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.detail-meta .tag{font-size:.78rem;padding:5px 14px;border-radius:50px;font-weight:600;
  background:rgba(var(--accent-rgb),.1);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.2)}
.detail-creator{font-size:.88rem;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.detail-creator a{color:var(--accent);font-weight:600}
.var-section{margin-bottom:24px}
.var-section h4{font-size:.9rem;font-weight:700;color:var(--accent2);margin-bottom:12px}
.var-inputs{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.var-input{display:flex;flex-direction:column;gap:4px}
.var-input label{font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.var-input input{padding:10px 14px;border-radius:8px;background:var(--bg-input);
  border:1px solid var(--border);color:var(--text-primary);font-size:.9rem;transition:border .2s}
.var-input input:focus{border-color:var(--accent)}
.prompt-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;margin-bottom:24px;position:relative}
.prompt-box pre{white-space:pre-wrap;word-wrap:break-word;font-size:.92rem;line-height:1.7;
  color:var(--text-primary);font-family:'DM Sans',sans-serif}
.prompt-box .var-highlight{color:var(--accent2);font-weight:700}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.action-btn{padding:12px 22px;border-radius:10px;font-weight:700;font-size:.88rem;
  display:inline-flex;align-items:center;gap:8px;transition:all .25s}
.action-btn.copy{background:var(--accent);color:#060610}
.action-btn.copy:hover{box-shadow:var(--glow-accent);transform:translateY(-2px)}
.action-btn.download{background:rgba(var(--info-rgb),.15);color:var(--info);border:1px solid rgba(var(--info-rgb),.3)}
.action-btn.download:hover{background:rgba(var(--info-rgb),.25)}
.action-btn.fav{background:rgba(var(--danger-rgb),.1);color:var(--danger);border:1px solid rgba(var(--danger-rgb),.25)}
.action-btn.fav.active{background:rgba(var(--danger-rgb),.2);border-color:var(--danger)}
.action-btn.report{background:rgba(var(--danger-rgb),.08);color:var(--text-muted);border:1px solid var(--border)}
.action-btn.report:hover{color:var(--danger);border-color:rgba(var(--danger-rgb),.3)}
.detail-stats{display:flex;gap:24px;margin-bottom:32px}
.detail-stats span{font-size:.85rem;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.detail-stats i{color:var(--accent)}
.related-section h3{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:18px}
.related-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory}
.related-scroll::-webkit-scrollbar{height:6px}
.related-scroll::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
.related-card{min-width:260px;max-width:280px;scroll-snap-align:start;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .3s}
.related-card:hover{border-color:rgba(var(--accent-rgb),.4);transform:translateY(-3px)}
.related-card img{width:100%;height:140px;object-fit:cover}
.related-card .rc-body{padding:14px}
.related-card h4{font-size:.88rem;font-weight:700;margin-bottom:4px}
.related-card span{font-size:.75rem;color:var(--text-muted)}

/* ============================================
   FORMS & PAGES (Contact, About, Credits, Terms)
   ============================================ */
.page-container{max-width:800px;margin:0 auto;padding:100px 24px 60px}
.page-container h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);
  font-weight:800;margin-bottom:24px}
.page-container h2{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;
  margin:28px 0 12px;color:var(--accent)}
.page-container p{color:var(--text-secondary);line-height:1.8;margin-bottom:16px}
.page-container a.accent-link{color:var(--accent);font-weight:600;border-bottom:1px solid rgba(var(--accent-rgb),.3)}
.page-container a.accent-link:hover{border-color:var(--accent)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;
  border-radius:10px;background:var(--bg-input);border:1px solid var(--border);
  color:var(--text-primary);font-size:.95rem;transition:border .25s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.notice-banner{background:rgba(var(--accent2-rgb),.1);border:1px solid rgba(var(--accent2-rgb),.3);
  border-radius:var(--radius);padding:16px 20px;margin:20px 0;font-size:.9rem;color:var(--accent2);
  font-weight:600;display:flex;align-items:flex-start;gap:10px}
.notice-banner i{font-size:1.2rem;margin-top:2px}
.contact-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:32px}
.contact-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;align-items:center;gap:14px;transition:border .25s}
.contact-card:hover{border-color:rgba(var(--accent-rgb),.3)}
.contact-card i{font-size:1.5rem;color:var(--accent)}
.contact-card div{font-size:.85rem;color:var(--text-secondary)}
.contact-card strong{display:block;color:var(--text-primary);font-size:1rem}
.credits-list{display:grid;gap:14px}
.credit-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 22px;display:flex;align-items:center;gap:16px;transition:border .25s}
.credit-item:hover{border-color:rgba(var(--accent-rgb),.3)}
.credit-avatar{width:48px;height:48px;border-radius:50%;background:rgba(var(--accent-rgb),.12);
  display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:800;font-size:1.1rem;flex-shrink:0}
.credit-info h4{font-size:1rem;font-weight:700}
.credit-info span{font-size:.82rem;color:var(--text-muted)}
.terms-content ul{padding-left:20px;margin-bottom:16px}
.terms-content li{color:var(--text-secondary);margin-bottom:8px;line-height:1.6}
.terms-content li strong{color:var(--text-primary)}

/* ============================================
   MODAL (Add Prompt, Report)
   ============================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);
  max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;
  transform:translateY(20px);transition:transform .3s}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-header h2{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700}
.modal-close{width:36px;height:36px;border-radius:50%;background:var(--bg-input);
  display:flex;align-items:center;justify-content:center;color:var(--text-muted);
  font-size:1.1rem;transition:all .2s}
.modal-close:hover{color:var(--danger);background:rgba(var(--danger-rgb),.1)}
.dynamic-fields{display:none;margin-top:12px}
.dynamic-fields.show{display:block}

/* ============================================
   TOAST NOTIFICATIONS
   ============================================ */
#toast-container{position:fixed;bottom:90px;right:20px;z-index:3000;display:flex;
  flex-direction:column-reverse;gap:10px;pointer-events:none}
.toast{padding:14px 22px;border-radius:10px;font-size:.88rem;font-weight:600;
  display:flex;align-items:center;gap:10px;pointer-events:all;
  animation:toastIn .4s ease;min-width:240px;max-width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast.success{background:rgba(var(--accent-rgb),.15);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.3)}
.toast.error{background:rgba(var(--danger-rgb),.15);color:var(--danger);border:1px solid rgba(var(--danger-rgb),.3)}
.toast.info{background:rgba(var(--info-rgb),.15);color:var(--info);border:1px solid rgba(var(--info-rgb),.3)}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}

/* ============================================
   FOOTER
   ============================================ */
footer{background:var(--bg-secondary);border-top:1px solid var(--border);padding:40px 24px;text-align:center}
.footer-inner{max-width:1280px;margin:0 auto}
.footer-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.footer-links a{font-size:.85rem;color:var(--text-secondary);transition:color .2s}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:.82rem;color:var(--text-muted)}
.footer-copy a{color:var(--accent);font-weight:600;transition:color .2s}
.footer-copy a:hover{color:var(--accent2)}

/* ============================================
   WHATSAPP FLOAT
   ============================================ */
#whatsapp-float{position:fixed;bottom:24px;right:24px;width:56px;height:56px;
  border-radius:50%;background:#25D366;color:#fff;font-size:1.6rem;
  display:flex;align-items:center;justify-content:center;z-index:900;
  box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .25s}
#whatsapp-float:hover{transform:scale(1.1)}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:768px){
  .nav-links,.btn-add-prompt.nav-btn{display:none}
  .nav-hamburger{display:flex}
  .prompts-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .hero-btns{flex-direction:column;align-items:center}
  .detail-actions{flex-direction:column}
  .action-btn{justify-content:center}
  .carousel{aspect-ratio:4/3}
  .contact-info-grid{grid-template-columns:1fr}
}
@media(min-width:769px) and (max-width:1024px){
  .prompts-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:1025px){
  .prompts-grid{grid-template-columns:repeat(3,1fr)}
}

/* ============================================
   UTILITY & ANIMATIONS
   ============================================ */
.fade-in{animation:fadeIn .5s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stagger-1{animation-delay:.1s}.stagger-2{animation-delay:.2s}.stagger-3{animation-delay:.3s}
.stagger-4{animation-delay:.4s}.stagger-5{animation-delay:.5s}
.text-accent{color:var(--accent)}
.text-danger{color:var(--danger)}
.text-muted{color:var(--text-muted)}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

  /* ---- ROUTER ---- */
  route() {
    const hash = window.location.hash || '#/';
    const path = hash.replace('#', '');
    this.state.currentRoute = path;
    this.closeMobile();
    this.updateNavActive(path);

    if (path === '/' || path === '') this.renderHome();
    else if (path === '/prompts') this.renderPrompts();
    else if (path.startsWith('/prompt/')) {
      const id = parseInt(path.split('/')[2]);
      this.renderDetail(id);
    }
    else if (path === '/contact') this.renderContact();
    else if (path === '/about') this.renderAbout();
    else if (path === '/credits') this.renderCredits();
    else if (path === '/terms') this.renderTerms();
    else this.renderHome();

    window.scrollTo({top:0, behavior:'smooth'});

    document.querySelectorAll('[data-nav]').forEach(a => {
      a.classList.toggle('active', a.dataset.nav === this.getNavKey(path));

  toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = {success:'fa-check-circle',error:'fa-times-circle',info:'fa-info-circle'};
    t.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;

  /* ---- VARIABLE PARSER ---- */
  parseVars(promptText) {
    const re = /\[([^\]]+)\]/g;
    const vars = [];
    let m;
    while ((m = re.exec(promptText)) !== null) {
      if (!vars.find(v=>v.name===m[1])) vars.push({name:m[1], original:m[0]});
    }
    return vars;
  },

  replaceVars(promptText, values) {
    let result = promptText;
    for (const [k,v] of Object.entries(values)) {
      if (v) result = result.replace(new RegExp(`\\[${k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\]`,'g'), `<span class="var-highlight">${v}</span>`);
    }
    return result;
  },

  replaceVarsPlain(promptText, values) {
    let result = promptText;
    for (const [k,v] of Object.entries(values)) {
      if (v) result = result.replace(new RegExp(`\\[${k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\]`,'g'), v);
    }
    return result;
  },

  /* ---- CARD 3D TILT ---- */
  initTilt() {
    document.querySelectorAll('.prompt-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        const rotateX = ((y - cy) / cy) * -6;
        const rotateY = ((x - cx) / cx) * 6;
        card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-6px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) translateY(0)';
      });
    });
  },

  /* ---- TYPEWRITER ---- */
  typewriter(el, texts, speed=80, pause=2000) {
    let textIdx = 0, charIdx = 0, deleting = false;
    const tick = () => {
      const current = texts[textIdx];
      if (!deleting) {
        el.textContent = current.substring(0, charIdx + 1);
        charIdx++;
        if (charIdx === current.length) {
          setTimeout(() => { deleting = true; tick(); }, pause);
          return;
        }
      } else {
        el.textContent = current.substring(0, charIdx - 1);
        charIdx--;
        if (charIdx === 0) {
          deleting = false;
          textIdx = (textIdx + 1) % texts.length;
        }
      }
      setTimeout(tick, deleting ? speed / 2 : speed);
    };
    tick();
  },

        <div class="detail-stats">
          <span><i class="fas fa-copy"></i> ${this.getTotalCopies(id)} copies</span>
          <span><i class="fas fa-eye"></i> ${this.getTotalViews(id)} views</span>
          <span><i class="fas fa-heart"></i> ${this.isFav(id)?'In your favorites':'Not favorited'}</span>
        </div>

        ${related.length ? `
        <div class="related-section">
          <h3>Related Prompts</h3>
          <div class="related-scroll">
            ${related.map(r => `
              <div class="related-card" onclick="window.location.hash='#/prompt/${r.id}'" tabindex="0" role="button">
                <img src="${r.images[0]}" alt="${r.title}" loading="lazy">
                <div class="rc-body">
                  <h4>${r.title}</h4>
                  <span><i class="fas fa-copy"></i> ${this.getTotalCopies(r.id)} copies</span>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}
      </div>`;
    this.state.carouselIndex = 0;
    // Touch swipe for carousel
    this.initCarouselSwipe();
  },

  /* ---- CAROUSEL CONTROLS ---- */
  carouselGo(id, idx) {
    const p = PROMPTS.find(x=>x.id===id);
    if (!p) return;
    this.state.carouselIndex = Math.max(0, Math.min(idx, p.images.length - 1));
    const track = document.getElementById('carousel-track');
    if (track) track.style.transform = `translateX(-${this.state.carouselIndex * 100}%)`;
    document.querySelectorAll('#carousel-dots span').forEach((d,i) => d.classList.toggle('active', i === this.state.carouselIndex));
  },
  carouselPrev(id) {
    this.carouselGo(id, this.state.carouselIndex - 1);
  },
  carouselNext(id) {
    const p = PROMPTS.find(x=>x.id===id);
    this.carouselGo(id, this.state.carouselIndex + 1);
  },
  initCarouselSwipe() {
    const carousel = document.getElementById('detail-carousel');
    if (!carousel) return;
    let startX = 0;
    carousel.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
    carousel.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      const hash = window.location.hash;
      const id = parseInt(hash.split('/')[2]);
      if (Math.abs(diff) > 50) {
        if (diff > 0) this.carouselNext(id);
        else this.carouselPrev(id);
      }
    }, {passive:true});
  },

  /* ---- VARIABLE REPLACEMENT LIVE ---- */
  updatePromptPreview(id) {
    const p = PROMPTS.find(x=>x.id===id);
    if (!p) return;
    const values = {};
    document.querySelectorAll(`[data-var]`).forEach(inp => {
      values[inp.dataset.var] = inp.value;
    });
    const preview = document.getElementById(`prompt-preview-${id}`);
    if (preview) {
      preview.innerHTML = this.replaceVars(p.prompt, values);
    }
  },

  /* ---- COPY PROMPT ---- */
  copyPrompt(id) {
    const p = PROMPTS.find(x=>x.id===id);
    if (!p) return;
    const values = {};
    document.querySelectorAll(`[data-var]`).forEach(inp => {
      values[inp.dataset.var] = inp.value;
    });
    const text = this.replaceVarsPlain(p.prompt, values);
    navigator.clipboard.writeText(text).then(() => {
      this.incrementCopies(id);
      const btn = document.getElementById(`copy-btn-${id}`);
      if (btn) { btn.innerHTML = '<i class="fas fa-check"></i> Copied!'; setTimeout(()=>{ btn.innerHTML = '<i class="fas fa-copy"></i> Copy Prompt'; }, 2000); }
      this.toast('Prompt copied to clipboard!', 'success');
    }).catch(() => {
      this.toast('Failed to copy. Please select and copy manually.', 'error');
    });
  },

  /* ---- DOWNLOAD IMAGES ---- */
  downloadImages(id) {
    const p = PROMPTS.find(x=>x.id===id);
    if (!p) return;
    p.images.forEach((img, i) => {
      const a = document.createElement('a');
      a.href = img;
      a.download = `${p.title.replace(/\s+/g,'_')}_${i+1}.jpg`;
      a.target = '_blank';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
    this.toast('Download started for example photos!', 'info');
  },
